
        <!DOCTYPE html>
        <html>
        <head>
            <title>Kyber Hardware Pipeline Benchmarks</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <style>
                body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; padding: 2rem; }
                .container { max-width: 1200px; margin: 0 auto; background: #1e293b; padding: 2rem; border-radius: 12px; }
                h1 { text-align: center; color: #38bdf8; }
            </style>
        </head>
        <body>
            <div class="container">
                <h1>Kyber KEM Execution Profiler</h1>
                <p style="text-align: center;">Absolute Time (ms) per Category Breakdown</p>
                <canvas id="benchmarkChart"></canvas>
            </div>
            <script>
                const ctx = document.getElementById('benchmarkChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {"labels": ["General", "Strings", "Integers", "Floats", "Bytes", "Compression"], "datasets": [{"label": "Inverse NTT", "data": [22.855, 43.722, 20.003, 15.182, 49.984, 322.087], "backgroundColor": "#3b82f6"}, {"label": "decoder poly to msg (hard)", "data": [0.328, 1.635, 0.687, 0.388, 1.608, 5.985], "backgroundColor": "#ef4444"}, {"label": "Forward NTT", "data": [29.731, 50.635, 24.349, 17.908, 53.366, 276.186], "backgroundColor": "#10b981"}, {"label": "Keccak PRF shake 256", "data": [0.619, 1.09, 0.504, 0.425, 1.443, 4.716], "backgroundColor": "#f59e0b"}, {"label": "encoder msg to poly", "data": [0.215, 1.193, 0.509, 0.28, 1.272, 5.294], "backgroundColor": "#8b5cf6"}, {"label": "Multiplication NTT", "data": [5.883, 11.856, 5.066, 4.586, 12.973, 85.213], "backgroundColor": "#ec4899"}, {"label": "Keccak XOF shake 128", "data": [1.088, 0.538, 0.681, 0.324, 0.367, 4.098], "backgroundColor": "#14b8a6"}]},
                    options: {
                        responsive: true,
                        scales: {
                            x: { stacked: true },
                            y: { stacked: true, title: { display: true, text: 'Total Time (ms)' } }
                        },
                        plugins: {
                            tooltip: { mode: 'index', intersect: false }
                        }
                    }
                });
            </script>
        </body>
        </html>
